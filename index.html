<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayAssist AI — Invoice Payment Proposal Agent</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://experience.sap.com/fiori-design-web/wp-content/themes/flavor/fonts/72/72-web.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="top-bar-left">
                <button class="icon-btn" title="Menu"><i class="fas fa-bars"></i></button>
                <span class="brand-title"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="vertical-align: middle"><circle cx="8" cy="8" r="8" fill="url(#jouleGrad)"/><path d="M5 8.5C5 7 6.5 5 8 5s3 2 3 3.5S9.5 11 8 11 5 10 5 8.5z" fill="#fff" opacity="0.9"/><defs><linearGradient id="jouleGrad" x1="0" y1="0" x2="16" y2="16"><stop stop-color="#5D36FF"/><stop offset="1" stop-color="#A100C2"/></linearGradient></defs></svg> PayAssist AI</span>
            </div>
            <div class="top-bar-right">
                <button class="icon-btn" title="Full Screen"><i class="fas fa-expand"></i></button>
                <button class="icon-btn" title="Close"><i class="fas fa-times"></i></button>
            </div>
        </div>

        <!-- Landing Page (shown initially) -->
        <div class="landing-page" id="landingPage">
            <div class="hero-section">
                <div class="hero-icon">
                    <div class="sparkle sparkle-1">✦</div>
                    <div class="sparkle sparkle-2">✦</div>
                    <div class="diamond-icon">
                        <i class="fas fa-file-invoice-dollar"></i>
                    </div>
                    <div class="sparkle sparkle-3">✦</div>
                </div>
            </div>
            <div class="welcome-section">
                <p class="welcome-greeting">Hello Jane,</p>
                <h1 class="welcome-heading">How can I help you?</h1>
                <div class="welcome-subtitle">
                    Talk to me naturally. For example, "what invoices need payment exceptions?"
                </div>
                <button class="get-started-btn" onclick="focusInput()">Get started</button>
                <div class="starter-chips">
                    <button class="chip" onclick="startWithSuggestion('What invoices I received in the past 10 days need payment exceptions?')"><i class="fas fa-search"></i> Find payment exceptions</button>
                    <button class="chip" onclick="startWithSuggestion('Show me overdue invoices')">
                        <i class="fas fa-clock"></i> Overdue invoices
                    </button>
                    <button class="chip" onclick="startWithSuggestion('Review supplier payment terms')">
                        <i class="fas fa-handshake"></i> Payment terms review
                    </button>
                    <button class="chip" onclick="startWithSuggestion('Show discount opportunities')">
                        <i class="fas fa-percent"></i> Discount opportunities
                    </button>
                    <button class="chip" onclick="startWithSuggestion('Generate exception report')">
                        <i class="fas fa-chart-bar"></i> Exception report
                    </button>
                </div>
            </div>
            <div class="landing-input-area">
                <div class="landing-input-container">
                    <input type="text" id="landingInput" placeholder="Ask about payment exceptions..." 
                           onkeypress="if(event.key==='Enter') sendFromLanding()">
                    <button class="send-btn" onclick="sendFromLanding()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="landing-hint"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="vertical-align: -1px; margin-right: 4px"><circle cx="8" cy="8" r="8" fill="#5D36FF" opacity="0.6"/><path d="M5 8.5C5 7 6.5 5 8 5s3 2 3 3.5S9.5 11 8 11 5 10 5 8.5z" fill="#fff"/></svg>PayAssist AI uses AI. Check for mistakes.</div>
            </div>
        </div>

        <!-- Chat View (hidden initially) -->
        <div class="chat-view" id="chatView" style="display:none">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <div class="input-container">
                    <button class="icon-btn attach-btn" title="Attach file"><i class="fas fa-paperclip"></i></button>
                    <input type="text" id="chatInput" placeholder="Ask about payment exceptions..." 
                           onkeypress="if(event.key==='Enter') sendMessage()">
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="input-hint">
                    <i class="fas fa-info-circle"></i>
                    Press Enter to send · AI-powered payment exception resolution
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
